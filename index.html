<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Byakuya</title>
    <style>
      body {
        margin: 0;
        padding: 40px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: "Yu Mincho", "YuMincho", "Hiragino Mincho ProN", "HGS Mincho E", "Georgia", "Times New Roman", serif;
        line-height: 2.0;
        color: #1a1a1a;
        box-sizing: border-box;
        transition: background-color 0.5s linear;
      }
      
      .container {
        max-width: 600px;
        text-align: left;
      }
      
      h1 {
        font-size: 1.15rem;
        font-weight: normal;
        margin-bottom: 3.5rem;
        letter-spacing: 0.3em;
      }
      
      .content {
        font-size: 0.95rem;
        letter-spacing: 0.05em;
        text-align: justify;
      }
      
      .tagline {
        margin-top: 5rem;
        font-size: 0.8rem;
        color: #666;
      }
      
      .patent-status {
        display: block;
        margin-top: 0.5rem;
        font-size: 0.7rem;
        color: #999;
        letter-spacing: 0.1em;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Byakuya</h1>

      <div class="content">
        Byakuyaとは、完成のあとに始まる価値のふるまいを観測するための設計である。<br><br>

        事物は、完成した瞬間に終わるのではない。<br>
        時間、使用、記録、継承。<br>
        それらの反復によって、価値は静かに変化していく。<br><br>

        Byakuyaは、その変化をただ保存するのではなく、<br>
        ポストサステナブルの視座から、未来に向けた構造として捉え直す。<br><br>

        所有の外側に、まだ言語化されていない層がある。<br>
        Byakuyaは、その輪郭に触れる。
      </div>

      <div class="tagline">
        記録は、所有を超えて残る。
        <span class="patent-status">2026 A’ Design Award Winner</span>
        <span class="patent-status">Patent Pending</span>
      </div>
    </div>

    <script>
      let x = Math.random();
      
      function updateBackground() {
        x = 3.9 * x * (1 - x);
        const brightness = 85 + (x * 15);
        document.body.style.backgroundColor = `hsl(0, 0%, ${brightness}%)`;
        const nextUpdate = 500 + Math.random() * 1000;
        setTimeout(updateBackground, nextUpdate);
      }
      
      updateBackground();
    </script>
  </body>
</html>
